<main class="app">
  <h1>Memories Builder</h1>
  <p class="intro">Select a text element in Webflow, then apply copy.</p>

  <section class="section">
    <h2>Quick presets</h2>
    <div class="stack">
      <button id="hero-headline" type="button">Set hero headline</button>
      <button id="hero-subheadline" type="button">Set hero subheadline</button>
      <button id="cta-primary" type="button">Set primary CTA</button>
      <button id="cta-secondary" type="button">Set secondary CTA</button>
    </div>
  </section>

  <section class="section">
    <h2>Custom text</h2>
    <textarea id="custom-text" rows="5" placeholder="Type text to apply to the selected text element..."></textarea>
    <button id="apply-custom" type="button">Apply custom text</button>
  </section>

  <p id="status" class="status"></p>
</main>
